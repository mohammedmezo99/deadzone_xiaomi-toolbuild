name: "MEZO Lite Bot"

on:
  workflow_dispatch:
    inputs:
      rom_url:
        description: "Direct URL to the Xiaomi firmware package"
        required: true
        type: string
      builder_name:
        description: "Optional builder display name for notifications"
        required: false
        default: "Public User"
        type: string
      builder_id:
        description: "Optional Telegram user ID for direct build updates"
        required: false
        type: string
      public_request_chat_id:
        description: "Optional public request chat id"
        required: false
        type: string
      public_request_message_id:
        description: "Optional public request message id"
        required: false
        type: string
      public_request_user:
        description: "Optional public requester username or display name"
        required: false
        type: string

concurrency:
  group: mezo-lite-bot-build
  cancel-in-progress: false

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      rom_url: ${{ inputs.rom_url }}
      style: Lite
      builder_name: ${{ inputs.builder_name }}
      builder_id: ${{ inputs.builder_id }}
    secrets: inherit
