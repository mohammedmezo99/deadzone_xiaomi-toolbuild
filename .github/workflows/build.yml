name: ⚡ DeadZone ROM Build

on:
  workflow_dispatch:
    inputs:
      input_url:
        description: "Direct URL to the Xiaomi firmware package"
        required: true
      builder_name:
        description: "Optional builder display name for notifications"
        required: false
      builder_id:
        description: "Optional Telegram user ID for direct build updates"
        required: false

jobs:
  Initialize:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
    steps:
      - name: 🧹 Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          swap-size-mb: 1024
          root-reserve-mb: 512
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"

      - name: 🗑️ Clean unused files and applications
        run: |
          docker rmi `docker images -q` || true
          sudo rm -rf /usr/share/dotnet /etc/mysql /etc/php /etc/sudo apt/sources.list.d || true
          sudo apt -y purge azure-cli ghc* zulu* hhvm llvm* firefox google* dotnet* powershell mysql* php* || true
          sudo apt -y autoremove --purge || true
          sudo apt -y autoclean || true
          sudo apt clean || true

      - name: 📥 Checkout repository
        uses: actions/checkout@main

      - name: 📣 Send start notification
        run: |
          pip install requests
          python notify.py start "${{ github.repository }}" "${{ inputs.input_url }}" "xiaomi" "${{ inputs.builder_name }}" "${{ inputs.builder_id }}"

      - name: 🕒 Set workflow timezone
        run: |
          echo "Setting Vietnam timezone"
          sudo timedatectl set-timezone Asia/Ho_Chi_Minh

      - name: ☕ Install OpenJDK
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: 📦 Install dependencies
        run: |
          sudo bash setup.sh

      - name: 🔐 Grant permissions
        run: |
          sudo chmod 777 -R *

      - name: 🛠️ Build ROM
        env:
          INPUT_URL: ${{ inputs.input_url }}
        run: |
          sudo -E bash build.sh "$INPUT_URL" "${{ github.repository }}" "xiaomi" "${{ inputs.builder_name }}" "${{ inputs.builder_id }}"

      - name: 📦 Pack ROM
        run: |
          python notify.py pack "${{ github.repository }}" "${{ inputs.input_url }}" "xiaomi" "${{ inputs.builder_name }}" "${{ inputs.builder_id }}"
          sudo bash packROM.sh

      - name: ☁️ Set up Rclone
        run: |
          sudo -E bash uploadROM.sh setup "${{ secrets.GH_TOKEN }}" "${{ secrets.GH_REPO }}" "${{ secrets.RCLONE_TOKEN_PATH }}"

      - name: ☁️ Upload ROM
        run: |
          python notify.py upload "${{ github.repository }}" "${{ inputs.input_url }}" "xiaomi" "${{ inputs.builder_name }}" "${{ inputs.builder_id }}"
          sudo -E bash uploadROM.sh

      - name: ✅ Send success notification
        if: success()
        run: |
          python notify.py success "${{ github.repository }}" "${{ inputs.input_url }}" "xiaomi" "${{ inputs.builder_name }}" "${{ inputs.builder_id }}"

      - name: ❌ Send failure notification
        if: failure()
        run: |
          python notify.py fail "${{ github.repository }}" "${{ inputs.input_url }}" "xiaomi" "${{ inputs.builder_name }}" "${{ inputs.builder_id }}"
